<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 Heads-Up</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #0d1b2a, #1b263b);
            color: #e8e8e8; min-height: 100vh; padding: 12px;
            max-width: 720px; margin: 0 auto;
        }

        /* ===== Auth overlay ===== */
        #auth-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center; z-index: 200;
        }
        #auth-box {
            background: #1a2a3a; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 32px; width: 340px;
        }
        #auth-box h1 { text-align: center; color: #f4d35e; margin-bottom: 20px; font-size: 22px; }
        .auth-tabs { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        .auth-tab {
            flex: 1; padding: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: bold;
            background: rgba(255,255,255,0.06); color: #aaa; transition: all 0.15s;
        }
        .auth-tab.active { background: #3a86ff; color: #fff; }
        .auth-field { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 6px; padding: 10px 12px; font-size: 14px; margin-bottom: 10px; }
        .auth-field::placeholder { color: #888; }
        .auth-submit { width: 100%; padding: 11px; background: #3a86ff; color: white; border: none;
            border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; transition: filter 0.15s; }
        .auth-submit:hover { filter: brightness(1.15); }
        .auth-hint { text-align: center; font-size: 12px; color: #888; margin-top: 10px; }
        #auth-error { color: #ff6b6b; font-size: 13px; min-height: 18px; margin-top: 8px; text-align: center; }

        /* ===== User bar ===== */
        #user-bar {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 8px 14px; margin-bottom: 10px;
        }
        #user-bar .uname { font-weight: bold; color: #f4d35e; }
        #user-bar .gold  { color: #ffd700; }
        #user-bar button { margin-left: auto; background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: #aaa; border-radius: 5px; padding: 4px 12px; font-size: 12px; cursor: pointer; }

        /* ===== Lobby ===== */
        #lobby {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 12px; margin-bottom: 12px;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center;
        }
        #lobby input {
            background: rgba(255,255,255,0.08); color: #fff;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 5px;
            padding: 7px 10px; font-size: 14px; width: 130px;
        }
        #lobby button {
            background: #3a86ff; color: white; border: none; border-radius: 5px;
            padding: 8px 16px; font-weight: bold; font-size: 14px; cursor: pointer; transition: filter 0.15s;
        }
        #lobby button.start { background: #06d6a0; color: #0a1f1a; }
        #lobby button:hover { filter: brightness(1.15); }

        /* ===== Table ===== */
        #table-area {
            background: radial-gradient(ellipse at center, #2d6a4f 0%, #1b4332 75%);
            border: 8px solid #5d3a1a; border-radius: 24px; padding: 28px 16px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), inset 0 0 50px rgba(0,0,0,0.35);
            margin-bottom: 12px; position: relative; min-height: 480px;
        }
        #phase-indicator {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 12px;
            font-size: 12px; color: #ddd; letter-spacing: 1px;
        }

        /* ===== Seat ===== */
        .seats-row { display: flex; justify-content: center; margin: 8px 0; }
        .seat {
            background: rgba(0,0,0,0.35); border-radius: 12px; padding: 10px 14px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            border: 2px solid transparent; transition: border-color 0.2s, box-shadow 0.2s;
            min-width: 220px; min-height: 150px; position: relative;
        }
        .seat.acting { border-color: #f4d35e; box-shadow: 0 0 18px rgba(244,211,94,0.5); }
        .seat.folded { opacity: 0.45; }
        .seat .name  { font-weight: bold; font-size: 14px; }
        .seat .info  { font-size: 11px; color: #b0c9b8; }
        .seat .chips { font-size: 16px; color: #f4d35e; font-weight: bold; }
        .seat .status { font-size: 11px; color: #ff9f1c; background: rgba(255,159,28,0.12);
            padding: 1px 8px; border-radius: 8px; }
        .bet-chip {
            position: absolute; top: -10px; right: -10px;
            background: linear-gradient(135deg, #f4d35e, #ee9b00); color: #1a1a1a;
            padding: 4px 10px; border-radius: 14px; font-weight: bold; font-size: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4); border: 2px solid #fff8e0;
        }
        .cards-area { display: flex; gap: 4px; margin-bottom: 4px; }

        /* ===== Card ===== */
        .card {
            display: inline-flex; flex-direction: column; justify-content: space-between;
            width: 46px; height: 64px; border-radius: 6px; background: #fff;
            border: 1px solid #ddd; padding: 4px 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.35); font-weight: bold; user-select: none;
        }
        .card.red { color: #d62828; }
        .card.black { color: #1a1a1a; }
        .card.back {
            background: repeating-linear-gradient(45deg,#1e3a5f 0,#1e3a5f 5px,#2c5aa0 5px,#2c5aa0 10px);
            border-color: #1e3a5f;
        }
        .card .rank { font-size: 15px; line-height: 1; }
        .card .suit { font-size: 22px; align-self: center; line-height: 1; }
        .empty-slot { width: 46px; height: 64px; border: 2px dashed rgba(255,255,255,0.12); border-radius: 6px; }

        /* ===== Table center ===== */
        .table-center { text-align: center; margin: 22px 0; }
        #pot { font-size: 22px; font-weight: bold; color: #f4d35e; margin-bottom: 12px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.6); }
        #community { display: flex; justify-content: center; gap: 4px; min-height: 64px; }

        /* ===== Action bar ===== */
        #action-bar {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
            padding: 12px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
            margin-bottom: 12px; align-items: center;
        }
        .action-btn {
            padding: 10px 16px; border: none; border-radius: 6px; font-weight: bold;
            font-size: 14px; cursor: pointer; color: white; min-width: 72px;
            transition: filter 0.15s, transform 0.15s;
        }
        .action-btn:hover:not(:disabled) { filter: brightness(1.18); transform: translateY(-1px); }
        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .action-btn.fold  { background: #d62828; }
        .action-btn.check { background: #5a7fa3; }
        .action-btn.call  { background: #3a86ff; }
        .action-btn.bet, .action-btn.raise { background: #06d6a0; color: #0a1f1a; }
        #raiseAmount {
            width: 90px; padding: 8px 10px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px;
            font-size: 14px; text-align: center;
        }
        #raiseAmount:disabled { opacity: 0.3; }

        /* ===== Admin panel ===== */
        #admin-panel {
            background: rgba(255,200,0,0.06); border: 1px solid rgba(255,200,0,0.25);
            border-radius: 10px; padding: 14px; margin-bottom: 12px;
        }
        #admin-panel h3 { color: #f4d35e; font-size: 14px; margin-bottom: 10px; }
        #admin-panel table { width: 100%; border-collapse: collapse; font-size: 13px; }
        #admin-panel th { color: #888; font-weight: normal; text-align: left; padding: 4px 6px; }
        #admin-panel td { padding: 4px 6px; border-top: 1px solid rgba(255,255,255,0.05); }
        #admin-panel input[type=number] {
            width: 100px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 4px; padding: 3px 6px; font-size: 13px;
        }
        #admin-panel button {
            background: #f4d35e; color: #1a1a1a; border: none; border-radius: 4px;
            padding: 3px 10px; font-size: 13px; font-weight: bold; cursor: pointer;
        }
        #admin-panel button:hover { filter: brightness(1.1); }
        #admin-msg { font-size: 12px; color: #06d6a0; margin-top: 6px; min-height: 16px; }

        /* ===== Log ===== */
        #log {
            background: rgba(0,0,0,0.3); padding: 10px; height: 130px; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
            font-size: 12px; color: #aaa;
        }
        #log p { margin: 2px 0; }
    </style>
</head>
<body>

<!-- ===== Auth overlay ===== -->
<div id="auth-overlay">
    <div id="auth-box">
        <h1>🎰 德州扑克</h1>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showTab('login')">登录</button>
            <button class="auth-tab"        onclick="showTab('register')">注册</button>
        </div>
        <div id="tab-login">
            <input class="auth-field" type="text"     id="login-user" placeholder="用户名">
            <input class="auth-field" type="password" id="login-pass" placeholder="密码">
            <button class="auth-submit" onclick="doLogin()">登录</button>
        </div>
        <div id="tab-register" style="display:none">
            <input class="auth-field" type="text"     id="reg-user" placeholder="用户名（2-20 字符）">
            <input class="auth-field" type="password" id="reg-pass" placeholder="密码（至少 6 位）">
            <button class="auth-submit" onclick="doRegister()">注册</button>
            <p class="auth-hint">注册即赠 10,000 金币 🪙</p>
        </div>
        <div id="auth-error"></div>
    </div>
</div>

<!-- ===== Game ===== -->
<div id="game-section" style="display:none">

    <div id="user-bar">
        <span class="uname" id="display-username"></span>
        <span class="gold">🪙 <span id="display-gold">0</span></span>
        <button id="admin-toggle" onclick="toggleAdminPanel()" style="display:none;background:#f4d35e;color:#1a1a1a;border:none;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:bold;cursor:pointer;">⚙️ 管理</button>
        <button onclick="doLogout()">退出登录</button>
    </div>

    <!-- 管理员面板（仅 isAdmin 可见） -->
    <div id="admin-panel" style="display:none">
        <h3>⚙️ 管理员面板</h3>
        <table id="admin-users-table">
            <thead><tr><th>用户名</th><th>金币</th><th>设置金币</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
        <div id="admin-msg"></div>
    </div>

    <div id="lobby">
        <input type="text"   id="roomInput"  placeholder="房间号" value="8888" style="width:110px">
        <input type="number" id="buyInInput" placeholder="带入筹码" value="1000" min="200" style="width:110px">
        <button onclick="joinRoom()">加入房间</button>
        <button class="start" onclick="startDeal()">开始新一局</button>
    </div>

    <div id="table-area">
        <div id="phase-indicator">等待开始</div>

        <!-- 对手（上方） -->
        <div class="seats-row" id="opponent-row"></div>

        <!-- 公共牌 + 底池 -->
        <div class="table-center">
            <div id="pot">💰 底池: 0</div>
            <div id="community"></div>
        </div>

        <!-- 自己（下方） -->
        <div class="seats-row" id="self-row"></div>
    </div>

    <div id="action-bar">
        <button class="action-btn fold"  id="btnFold"  onclick="act('fold')">弃牌 Fold</button>
        <button class="action-btn check" id="btnCheck" onclick="act('check')">过牌 Check</button>
        <button class="action-btn call"  id="btnCall"  onclick="act('call')">跟注 Call</button>
        <input  type="number" id="raiseAmount" placeholder="金额">
        <button class="action-btn bet"   id="btnBet"   onclick="actBet()">下注 Bet</button>
        <button class="action-btn raise" id="btnRaise" onclick="actRaise()">加注 Raise</button>
    </div>

    <div id="log"></div>
</div>

<script>
// ===== State =====
let socket       = null;
let myUserId     = null;
let myUsername   = null;
let myGold       = 0;
let myHoleCards  = [];
let revealedCards = {};  // userId -> [{suit,rank},{suit,rank}]  (showdown)
let currentRoom  = '';

// ===== Auth =====
function showTab(tab) {
    document.getElementById('tab-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
    document.querySelectorAll('.auth-tab').forEach((b, i) =>
        b.classList.toggle('active', (tab === 'login') ? i === 0 : i === 1));
    document.getElementById('auth-error').textContent = '';
}

function setAuthError(msg) {
    document.getElementById('auth-error').textContent = msg;
}

async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!username || !password) return setAuthError('请填写用户名和密码');
    try {
        const res = await fetch('/api/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) return setAuthError(data.error);
        onAuthSuccess(data);
    } catch { setAuthError('网络错误，请重试'); }
}

async function doRegister() {
    const username = document.getElementById('reg-user').value.trim();
    const password = document.getElementById('reg-pass').value;
    if (!username || !password) return setAuthError('请填写用户名和密码');
    try {
        const res = await fetch('/api/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) return setAuthError(data.error);
        onAuthSuccess(data);
    } catch { setAuthError('网络错误，请重试'); }
}

function onAuthSuccess({ token, user }) {
    localStorage.setItem('token', token);
    myUserId   = user.id;
    myUsername = user.username;
    myGold     = user.gold;
    isAdmin    = !!user.isAdmin;
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('game-section').style.display = '';
    document.getElementById('admin-toggle').style.display = isAdmin ? '' : 'none';
    updateUserBar();
    connectSocket(token);
}

function doLogout() {
    localStorage.removeItem('token');
    if (socket) { socket.disconnect(); socket = null; }
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('game-section').style.display = 'none';
    myHoleCards = []; revealedCards = {}; currentRoom = '';
}

// ===== Socket =====
function connectSocket(token) {
    if (socket) socket.disconnect();
    socket = io({ auth: { token } });

    socket.on('connect_error', (err) => {
        localStorage.removeItem('token');
        document.getElementById('auth-overlay').style.display = 'flex';
        document.getElementById('game-section').style.display = 'none';
        setAuthError(err.message || '连接失败，请重新登录');
    });

    socket.on('server_msg', (msg) => {
        const log = document.getElementById('log');
        const p = document.createElement('p');
        p.textContent = msg;
        log.appendChild(p);
        log.scrollTop = log.scrollHeight;
    });

    socket.on('hole_cards', (cards) => {
        myHoleCards = cards;
        revealedCards = {};  // 新一局清除 showdown 展示
        renderSeats(null);   // 用最新 state 重渲（等 game_state 来）
    });

    socket.on('showdown_reveal', (reveals) => {
        revealedCards = reveals;
    });

    socket.on('gold_update', ({ gold }) => {
        myGold = gold;
        updateUserBar();
    });

    socket.on('game_state', (state) => {
        render(state);
    });
}

// ===== Lobby actions =====
function joinRoom() {
    currentRoom = document.getElementById('roomInput').value.trim();
    const buyIn = parseInt(document.getElementById('buyInInput').value) || 1000;
    if (currentRoom && socket) socket.emit('join_room', { roomId: currentRoom, buyIn });
}
function startDeal() {
    if (currentRoom && socket) socket.emit('start_deal', currentRoom);
}

// ===== Game actions =====
function act(action) {
    if (currentRoom && socket) socket.emit('player_action', { roomId: currentRoom, action });
}
function actBet() {
    const amount = parseInt(document.getElementById('raiseAmount').value);
    if (!amount) { alert('请输入下注金额'); return; }
    socket.emit('player_action', { roomId: currentRoom, action: 'bet', amount });
}
function actRaise() {
    const amount = parseInt(document.getElementById('raiseAmount').value);
    if (!amount) { alert('请输入加注金额'); return; }
    socket.emit('player_action', { roomId: currentRoom, action: 'raise', amount });
}

// ===== UI helpers =====
function updateUserBar() {
    document.getElementById('display-username').textContent = myUsername || '';
    document.getElementById('display-gold').textContent = myGold?.toLocaleString() || '0';
}

function formatCard(c) {
    const sym = { Spades:'♠', Hearts:'♥', Diamonds:'♦', Clubs:'♣' }[c.suit] || '?';
    const red  = c.suit === 'Hearts' || c.suit === 'Diamonds';
    return `<span class="card ${red ? 'red' : 'black'}">
                <span class="rank">${c.rank}</span>
                <span class="suit">${sym}</span>
            </span>`;
}
function cardBack() {
    return `<span class="card back"></span>`;
}
function emptySlot() {
    return `<span class="empty-slot"></span>`;
}

function renderSeats(state) {
    if (!state) return;

    const selfP   = state.players.find(p => p.userId === myUserId);
    const others  = state.players.filter(p => p.userId !== myUserId);

    // 对手区域
    document.getElementById('opponent-row').innerHTML = others.length
        ? others.map(p => buildSeat(p, state)).join('')
        : `<div style="color:rgba(255,255,255,0.3);font-size:13px;padding:20px;">等待对手加入…</div>`;

    // 自己区域
    document.getElementById('self-row').innerHTML = selfP
        ? buildSeat(selfP, state) : '';
}

function buildSeat(p, state) {
    const isMe     = p.userId === myUserId;
    const isBtn    = p.userId === state.buttonUserId;
    const isActing = p.userId === state.actionOnUserId;
    const cls      = ['seat', isActing ? 'acting' : '', p.folded ? 'folded' : ''].filter(Boolean).join(' ');

    const role     = isBtn ? '🎯 SB(庄家)' : '🪑 BB';
    const status   = p.folded ? '已弃牌' : p.allIn ? 'All-in' : '';

    // 手牌展示
    let cardsHtml = '';
    if (p.folded) {
        cardsHtml = emptySlot() + emptySlot();
    } else if (isMe && myHoleCards.length === 2) {
        cardsHtml = myHoleCards.map(formatCard).join('');
    } else if (!isMe && revealedCards[p.userId]) {
        cardsHtml = revealedCards[p.userId].map(formatCard).join('');
    } else if (state.phase !== 'waiting' && state.phase !== 'showdown') {
        cardsHtml = cardBack() + cardBack();
    } else {
        cardsHtml = emptySlot() + emptySlot();
    }

    const betHtml = p.currentBet > 0
        ? `<div class="bet-chip">下注 ${p.currentBet}</div>` : '';

    return `<div class="${cls}">
        ${betHtml}
        <div class="name">${isMe ? '👤 ' + p.username : p.username}</div>
        <div class="info">${role}</div>
        <div class="cards-area">${cardsHtml}</div>
        <div class="chips">💵 ${p.chips}</div>
        ${status ? `<div class="status">${status}</div>` : ''}
        ${isActing ? '<div style="font-size:11px;color:#f4d35e;margin-top:2px;">← 行动中</div>' : ''}
    </div>`;
}

function render(state) {
    document.getElementById('phase-indicator').textContent = `阶段: ${state.phase}`;
    document.getElementById('pot').textContent = `💰 底池: ${state.pot}`;

    document.getElementById('community').innerHTML = state.communityCards.length
        ? state.communityCards.map(formatCard).join('')
        : '<span style="color:rgba(255,255,255,0.2);font-size:13px;line-height:64px;">公共牌</span>';

    renderSeats(state);

    // 按钮启用逻辑
    const myTurn = state.actionOnUserId === myUserId;
    const me     = state.players.find(p => p.userId === myUserId);
    const toCall = me ? state.currentBet - me.currentBet : 0;

    document.getElementById('btnFold').disabled    = !myTurn;
    document.getElementById('btnCheck').disabled   = !myTurn || toCall > 0;
    document.getElementById('btnCall').disabled    = !myTurn || toCall <= 0;
    document.getElementById('btnBet').disabled     = !myTurn || state.currentBet > 0;
    document.getElementById('btnRaise').disabled   = !myTurn || state.currentBet === 0;
    document.getElementById('raiseAmount').disabled = !myTurn;

    document.getElementById('btnCall').textContent =
        (myTurn && toCall > 0) ? `跟注 Call (${toCall})` : '跟注 Call';
}

// ===== Admin =====
let isAdmin = false;

function toggleAdminPanel() {
    const panel = document.getElementById('admin-panel');
    const visible = panel.style.display !== 'none';
    if (!visible) loadAdminUsers();
    panel.style.display = visible ? 'none' : '';
}

async function loadAdminUsers() {
    const token = localStorage.getItem('token');
    const res = await fetch('/api/admin/users', {
        headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) return;
    const users = await res.json();
    const tbody = document.querySelector('#admin-users-table tbody');
    tbody.innerHTML = users.map(u => `
        <tr>
            <td>${u.username}${u.isAdmin ? ' 👑' : ''}</td>
            <td>${u.gold.toLocaleString()}</td>
            <td><input type="number" id="gold-${u.id}" value="${u.gold}" min="0"></td>
            <td><button onclick="adminSetGold('${u.username}','${u.id}')">确认</button></td>
        </tr>`).join('');
}

async function adminSetGold(username, userId) {
    const token = localStorage.getItem('token');
    const gold = parseInt(document.getElementById(`gold-${userId}`).value);
    if (isNaN(gold) || gold < 0) return;
    const res = await fetch('/api/admin/set-gold', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ username, gold })
    });
    const data = await res.json();
    const msg = document.getElementById('admin-msg');
    if (res.ok) {
        msg.textContent = `✅ ${data.username} 金币已设为 ${data.gold.toLocaleString()}`;
        // 如果改的是自己，更新本地显示
        if (username.toLowerCase() === myUsername.toLowerCase()) {
            myGold = data.gold;
            updateUserBar();
            if (socket) socket.emit('request_gold_sync');
        }
        loadAdminUsers();
    } else {
        msg.textContent = `❌ ${data.error}`;
    }
}

// ===== Init =====
;['btnFold','btnCheck','btnCall','btnBet','btnRaise','raiseAmount'].forEach(id => {
    document.getElementById(id).disabled = true;
});

// 检查本地 token，自动登录
const savedToken = localStorage.getItem('token');
if (savedToken) {
    try {
        const payload = JSON.parse(atob(savedToken.split('.')[1]));
        if (payload.exp * 1000 > Date.now()) {
            myUserId   = payload.id;
            myUsername = payload.username;
            isAdmin    = !!payload.isAdmin;
            document.getElementById('display-username').textContent = myUsername;
            document.getElementById('admin-toggle').style.display = isAdmin ? '' : 'none';
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('game-section').style.display = '';
            connectSocket(savedToken);
        } else {
            localStorage.removeItem('token');
        }
    } catch {
        localStorage.removeItem('token');
    }
}
